name: Deploy Transcript Service

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy.yml"
      - "Dockerfile"
      - "requirements.txt"
      - "app/**"
      - "infra/terraform/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: transcriptservice-prod
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  TF_DIR: infra/terraform
  TF_IN_AUTOMATION: "true"

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      terraform: ${{ steps.filter.outputs.terraform }}
      app: ${{ steps.filter.outputs.app }}
    steps:
      - uses: actions/checkout@v4

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            terraform:
              - 'infra/terraform/**'
            app:
              - 'app/**'
              - 'Dockerfile'
              - 'requirements.txt'

  terraform:
    needs: changes
    if: needs.changes.outputs.terraform == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set Up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Bootstrap Terraform Backend
        id: backend
        shell: bash
        run: |
          set -euo pipefail
          account_id="$(aws sts get-caller-identity --query Account --output text)"
          bucket="transcriptapi-terraform-state-${account_id}-${AWS_REGION}"

          if ! aws s3api head-bucket --bucket "$bucket" 2>/dev/null; then
            if [ "$AWS_REGION" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "$bucket"
            else
              aws s3api create-bucket --bucket "$bucket" --create-bucket-configuration "LocationConstraint=${AWS_REGION}"
            fi
          fi

          aws s3api put-bucket-versioning \
            --bucket "$bucket" \
            --versioning-configuration Status=Enabled

          aws s3api put-bucket-encryption \
            --bucket "$bucket" \
            --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

          echo "bucket=$bucket" >> "$GITHUB_OUTPUT"

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -input=false \
            -backend-config="bucket=${{ steps.backend.outputs.bucket }}" \
            -backend-config="key=transcriptapi/prod.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true"

      - name: Terraform Format Check
        working-directory: ${{ env.TF_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_DIR }}
        shell: bash
        run: |
          set +e
          terraform plan -input=false -detailed-exitcode -out=tfplan
          exitcode=$?
          set -e
          if [ "$exitcode" -eq 1 ]; then
            exit 1
          fi
          echo "exitcode=$exitcode" >> "$GITHUB_OUTPUT"

      - name: Terraform Apply
        if: steps.plan.outputs.exitcode == '2'
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -input=false -auto-approve tfplan

  deploy_app:
    needs:
      - changes
      - terraform
    if: always() && needs.changes.outputs.app == 'true' && (needs.terraform.result == 'success' || needs.terraform.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set Up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Bootstrap Terraform Backend
        id: backend
        shell: bash
        run: |
          set -euo pipefail
          account_id="$(aws sts get-caller-identity --query Account --output text)"
          bucket="transcriptapi-terraform-state-${account_id}-${AWS_REGION}"

          if ! aws s3api head-bucket --bucket "$bucket" 2>/dev/null; then
            if [ "$AWS_REGION" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "$bucket"
            else
              aws s3api create-bucket --bucket "$bucket" --create-bucket-configuration "LocationConstraint=${AWS_REGION}"
            fi
          fi

          aws s3api put-bucket-versioning \
            --bucket "$bucket" \
            --versioning-configuration Status=Enabled

          aws s3api put-bucket-encryption \
            --bucket "$bucket" \
            --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

          echo "bucket=$bucket" >> "$GITHUB_OUTPUT"

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -input=false \
            -backend-config="bucket=${{ steps.backend.outputs.bucket }}" \
            -backend-config="key=transcriptapi/prod.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true"

      - name: Read Deployment Outputs
        id: tf
        working-directory: ${{ env.TF_DIR }}
        shell: bash
        run: |
          echo "ecr_repository_url=$(terraform output -raw ecr_repository_url)" >> "$GITHUB_OUTPUT"
          echo "ecs_cluster_name=$(terraform output -raw ecs_cluster_name)" >> "$GITHUB_OUTPUT"
          echo "ecs_service_name=$(terraform output -raw ecs_service_name)" >> "$GITHUB_OUTPUT"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Image
        env:
          ECR_REPOSITORY_URL: ${{ steps.tf.outputs.ecr_repository_url }}
          IMAGE_SHA_TAG: ${{ github.sha }}
        run: |
          docker build -t "$ECR_REPOSITORY_URL:latest" -t "$ECR_REPOSITORY_URL:$IMAGE_SHA_TAG" .
          docker push "$ECR_REPOSITORY_URL:latest"
          docker push "$ECR_REPOSITORY_URL:$IMAGE_SHA_TAG"

      - name: Force ECS Deployment
        run: |
          aws ecs update-service \
            --cluster "${{ steps.tf.outputs.ecs_cluster_name }}" \
            --service "${{ steps.tf.outputs.ecs_service_name }}" \
            --force-new-deployment
